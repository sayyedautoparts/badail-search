services:
  - type: web
    name: badail-search
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_DB_PATH
        value: /var/data/search_data.db
    disk:
      name: badail-data
      mountPath: /var/data
      sizeGB: 1
